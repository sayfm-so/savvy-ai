<!DOCTYPE html>

<title>Office v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#050510;font-family:'Courier New',monospace;padding:12px;}
h2{color:#00ffcc;text-align:center;letter-spacing:3px;font-size:14px;margin-bottom:12px;}
#wrap{position:relative;width:860px;height:540px;margin:0 auto;overflow:hidden;background:#0a0a16;border:1px solid #1a2a4a;}

/* grid overlay */
#wrap::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(28,28,44,0.4) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(28,28,44,0.4) 1px,transparent 1px);
  background-size:16px 16px;pointer-events:none;z-index:0;}

/* scanlines */
#wrap::after{content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 3px);
  pointer-events:none;z-index:999;}

/* rooms */
.room{position:absolute;border:1.5px solid rgba(0,80,255,0.4);z-index:1;}
.room-label{position:absolute;top:5px;left:7px;font-size:9px;letter-spacing:2px;opacity:0.85;font-weight:bold;}

/* desks */
.desk{position:absolute;z-index:3;}
.desk-body{width:54px;height:30px;background:#1a1a2e;border:1px solid #2a2a4e;position:relative;}
.monitor{position:absolute;background:#0d0d1a;border:1px solid #222244;}
.mon1{left:3px;top:2px;width:18px;height:13px;}
.mon2{left:25px;top:2px;width:13px;height:10px;}
.screen-lines{position:absolute;inset:2px;display:flex;flex-direction:column;gap:2px;}
.sl{height:2px;border-radius:1px;transition:width 2s ease;}
.keyboard{position:absolute;left:3px;top:17px;width:22px;height:5px;background:#13132a;border:1px solid #1a1a3a;}
.extra{position:absolute;right:2px;top:16px;width:8px;height:10px;}
.coffee-cup{background:#3d2000;border-top:2px solid #5a3300;}
.notebook{background:#1a2a1a;border:1px solid #226622;}
.mini-plant{background:#226622;border-radius:50% 50% 0 0;}

/* server rack */
.server{position:absolute;width:18px;background:#1e2e3e;border:1px solid #2a3a4a;z-index:3;}
.bay{height:10px;background:#111e2a;border:1px solid #1a2a3a;margin:2px;display:flex;align-items:center;justify-content:flex-end;padding-right:2px;}
.led{width:3px;height:3px;border-radius:50%;}

/* plants */
.plant{position:absolute;z-index:3;}
.pot{background:#7a4422;border:1px solid #553311;}
.leaf{background:#2a7a2a;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;}

/* whiteboard */
.wb{position:absolute;background:#101e30;border:1px solid rgba(79,163,255,0.4);z-index:3;overflow:hidden;}
.wb-line{height:1.5px;background:rgba(79,163,255,0.2);margin:5px 4px 0;}

/* bookshelf */
.bookshelf{position:absolute;background:#1a1220;border:1px solid #2a1a30;z-index:3;display:flex;flex-direction:column;gap:1px;padding:2px;}
.shelf-row{display:flex;gap:1px;height:10px;}
.book{height:10px;border-radius:1px 1px 0 0;}

/* coffee machine */
.cm{position:absolute;width:22px;height:32px;background:#1a1a2e;border:1px solid #2a2a4e;z-index:3;}
.cm-screen{position:absolute;top:3px;left:3px;width:10px;height:7px;background:#001420;display:flex;align-items:center;justify-content:center;font-size:4px;color:#00ffcc;}
.cm-nozzle{position:absolute;top:16px;left:8px;width:6px;height:8px;background:#111122;}

/* window */
.win{position:absolute;background:#0a0a18;border:1px solid #1a2a4a;z-index:3;overflow:hidden;}
.win-sky{width:100%;height:55%;background:linear-gradient(#000514,#001028);}
.win-city{width:100%;height:45%;background:#050518;display:flex;align-items:flex-end;}
.building{background:#060618;display:flex;flex-direction:column;justify-content:flex-start;padding-top:4px;flex:1;}
.bwin{width:3px;height:2px;margin:1px auto;background:rgba(255,238,136,0.4);}
.win-cross-h{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(26,42,74,0.5);}
.win-cross-v{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(26,42,74,0.5);}

/* reception */
.reception{position:absolute;background:#1a1a3a;border:1px solid #0050ff;z-index:3;}

/* sofa */
.sofa{position:absolute;background:#1a1230;border:1px solid #2a1a40;z-index:3;}

/* robot */
.robot-icon{position:absolute;z-index:3;}

/* characters */
.char{position:absolute;z-index:10;display:flex;flex-direction:column;align-items:center;}
.char-sprite{width:16px;height:26px;position:relative;}

/* chat bubble */
.bubble{position:absolute;z-index:20;pointer-events:none;}
.bubble-box{
  background:rgba(13,26,46,0.95);
  border:1px solid rgba(79,163,255,0.28);
  border-radius:8px 8px 8px 3px;
  padding:5px 8px 10px;
  font-size:8px;
  color:#cceeff;
  line-height:1.5;
  max-width:140px;
  min-width:90px;
  position:relative;
}
.bubble-box.right{border-radius:8px 8px 3px 8px;}
.bubble-name{display:block;font-size:8px;font-weight:bold;margin-bottom:2px;}
.bubble-tail{
  position:absolute;bottom:-8px;left:10px;
  width:0;height:0;
  border-left:6px solid transparent;
  border-right:10px solid transparent;
  border-top:8px solid rgba(13,26,46,0.95);
}
.bubble-tail.right{left:auto;right:10px;}
.bubble-badge{
  position:absolute;bottom:3px;left:8px;
  font-size:7px;display:flex;align-items:center;gap:3px;
}
.badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.convo-link{position:absolute;z-index:8;pointer-events:none;}

/* printer */
.printer{position:absolute;background:#1e1e30;border:1px solid #2a2a44;z-index:3;}
</style>
</head>

<script>
// ── Desk builder ──
const deskColors = {

const deskPositions = [

  // AI Core
  {x:246,y:54,r:'ai',e:'coffee'},{x:298,y:54,r:'ai',e:'notebook'},{x:350,y:54,r:'ai',e:'plant'},

  {x:396,y:294,r:'legal',e:'plant'},{x:448,y:294,r:'legal',e:'coffee'},

function makeDesk(p) {
  const col = deskColors[p.r];

    <div class="desk-body">
      <div class="monitor mon1">
        <div style="position:absolute;inset:2px;background:${col}11;">
          <div class="sl" style="background:${col};width:${8+Math.random()*7|0}px;opacity:0.75;margin-top:1px;"></div>
          <div class="sl" style="background:${col};width:${5+Math.random()*8|0}px;opacity:0.65;"></div>
          <div class="sl" style="background:${col};width:${6+Math.random()*6|0}px;opacity:0.55;"></div>
        </div>
      </div>
      <div class="monitor mon2">
        <div style="position:absolute;inset:2px;background:rgba(255,140,0,0.07);">
          <div style="height:1.5px;background:rgba(255,140,0,0.5);width:${5+Math.random()*5|0}px;margin:1px 1px 0;"></div>
          <div style="height:1.5px;background:rgba(255,140,0,0.4);width:${4+Math.random()*4|0}px;margin:1px;"></div>
        </div>
      </div>
      <div style="position:absolute;left:11px;top:14px;width:3px;height:4px;background:#1a1a2e;"></div>
      <div class="keyboard"></div>
      <div style="position:absolute;left:29px;top:17px;width:6px;height:8px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:#13132a;"></div>
      ${p.e==='coffee'?`<div style="position:absolute;right:2px;top:17px;width:7px;height:10px;background:#3d2000;border-top:2px solid #5a3300;border-radius:1px;"></div>`:''}
      ${p.e==='notebook'?`<div style="position:absolute;right:2px;top:17px;width:7px;height:10px;background:#1a2a1a;border:1px solid #226622;"></div>`:''}
      ${p.e==='plant'?`<div style="position:absolute;right:2px;top:16px;"><div style="width:8px;height:6px;background:#226622;border-radius:50% 50% 0 0;margin:0 auto;"></div><div style="width:6px;height:5px;background:#7a4422;margin:0 auto;"></div></div>`:''}
    </div>`;
  return d;
}

const desksEl = document.getElementById('desks');
deskPositions.forEach(p => desksEl.appendChild(makeDesk(p)));

// ── Conversations ──
const CONVOS = [
  {
    pairs: ['SAVVY','CLAUDE'],
    exchanges: [
      ['SAVVY',  'RAG precision up 12% today. New chunking paid off.'],
      ['CLAUDE', 'Saw the diff. The overlap threshold change was the key.'],
      ['SAVVY',  'Rami is going to love the benchmark report.'],
      ['CLAUDE', 'Already writing the summary. Clean numbers.'],
    ]
  },
  {
    pairs: ['GOOGLE','OPS-1'],
    exchanges: [
      ['GOOGLE', 'All 6 endpoints nominal. 42ms avg latency.'],
      ['OPS-1',  'CPU at 34%. Traffic spike expected at 3pm Seoul.'],
      ['GOOGLE', 'Already bumped the quota. We are covered.'],
      ['OPS-1',  'Deploy pipeline is green. Good to go.'],
    ]
  },
  {
    pairs: ['DEV-1','DEV-2'],
    exchanges: [
      ['DEV-1', 'Found the bug — typo in line 47. Classic.'],
      ['DEV-2', '11 of 12 tests passing now. One edge case left.'],
      ['DEV-1', 'Empty array input? I hit that yesterday.'],
      ['DEV-2', 'Exactly that. Fixing it now.'],
    ]
  },
];

const ACTORS = [
  { name:'SAVVY',   cx:308, cy:128, color:'#0050ff', convo:0, side:0, state:'WORKING',   sc:'#00ffcc' },
  { name:'CLAUDE',  cx:106, cy:100, color:'#4fa3ff', convo:0, side:1, state:'THINKING',  sc:'#ffee44' },
  { name:'GOOGLE',  cx:706, cy:100, color:'#ff8c00', convo:1, side:0, state:'WORKING',   sc:'#00ffcc' },
  { name:'DEV-1',   cx:108, cy:306, color:'#00cc88', convo:2, side:0, state:'WORKING',   sc:'#00ffcc' },
  { name:'DEV-2',   cx:454, cy:306, color:'#cc44aa', convo:2, side:1, state:'REVIEWING', sc:'#aaccff' },
  { name:'OPS-1',   cx:562, cy:96,  color:'#ffcc00', convo:1, side:1, state:'WORKING',   sc:'#00ffcc' },
  { name:'ROBOT-E', cx:714, cy:316, color:'#44aaff', convo:-1,side:-1,state:'WORKING',   sc:'#00ffcc',
    solo:'Joint sweep complete. 24/24 axes nominal.' },
];

function makeChar(a) {
  const w = document.createElement('div');
  w.className = 'char';
  w.style.cssText = `left:${a.cx-8}px;top:${a.cy-32}px;`;
  w.innerHTML = `
    <div class="char-sprite" id="cs_${a.name}">
      <div style="position:absolute;bottom:-2px;left:1px;width:14px;height:3px;border-radius:50%;background:rgba(0,0,0,0.3);"></div>
      <div style="position:absolute;top:0;left:3px;width:10px;height:7px;background:${a.color};border-radius:2px 2px 0 0;"></div>
      <div style="position:absolute;top:1px;left:3px;width:10px;height:2px;background:${a.color}cc;"></div>
      <div style="position:absolute;top:1px;left:3px;width:2px;height:5px;background:${a.color}cc;"></div>
      <div style="position:absolute;top:1px;right:3px;width:2px;height:5px;background:${a.color}cc;"></div>
      <div style="position:absolute;top:4px;left:4px;width:3px;height:3px;background:#000;"></div>
      <div style="position:absolute;top:4px;left:9px;width:3px;height:3px;background:#000;"></div>
      <div style="position:absolute;top:4px;left:5px;width:1px;height:1px;background:#fff;"></div>
      <div style="position:absolute;top:4px;left:10px;width:1px;height:1px;background:#fff;"></div>
      <div style="position:absolute;top:6px;left:5px;width:6px;height:4px;background:#d4a470;"></div>
      <div style="position:absolute;top:9px;left:2px;width:12px;height:10px;background:${a.color};"></div>
      <div style="position:absolute;top:9px;left:2px;width:12px;height:2px;background:rgba(255,255,255,0.1);"></div>
      <div style="position:absolute;top:10px;left:0;width:2px;height:7px;background:${a.color}cc;"></div>
      <div style="position:absolute;top:10px;right:0;width:2px;height:7px;background:${a.color}cc;"></div>
      <div style="position:absolute;top:16px;left:0;width:2px;height:2px;background:#d4a470;"></div>
      <div style="position:absolute;top:16px;right:0;width:2px;height:2px;background:#d4a470;"></div>
      <div style="position:absolute;top:18px;left:3px;width:5px;height:8px;background:${a.color}99;"></div>
      <div style="position:absolute;top:18px;left:8px;width:5px;height:8px;background:${a.color}99;"></div>
      <div style="position:absolute;top:24px;left:2px;width:6px;height:3px;background:#111;"></div>
      <div style="position:absolute;top:24px;left:8px;width:6px;height:3px;background:#111;"></div>
    </div>`;
  return w;
}

function makeBubble(a, text, isRight) {
  const div = document.createElement('div');
  div.className = 'bubble';
  const bx = isRight ? a.cx - 155 : a.cx - 12;
  const by = a.cy - 105;
  div.style.cssText = `left:${bx}px;top:${by}px;`;
  div.innerHTML = `
    <div class="bubble-box${isRight?' right':''}" id="bb_${a.name}">
      <span class="bubble-name" style="color:${a.color}">${a.name}</span>
      <span id="bt_${a.name}" style="display:block;">${text}</span>
      <div class="bubble-tail${isRight?' right':''}"></div>
      <div class="bubble-badge">
        <div class="badge-dot" style="background:${a.sc}"></div>
        <span style="color:${a.sc}">${a.state}</span>
      </div>
    </div>`;
  return div;
}

const charsEl = document.getElementById('chars');
ACTORS.forEach(a => {
  charsEl.appendChild(makeChar(a));
  const isRight = a.side === 1;
  const initText = a.solo || (a.convo >= 0 ? CONVOS[a.convo].exchanges[0][1] : '...');
  charsEl.appendChild(makeBubble(a, initText, isRight));
});

// ── SVG convo links ──
const svg = document.getElementById('links');
CONVOS.forEach(c => {
  const a1 = ACTORS.find(a=>a.name===c.pairs[0]);
  const a2 = ACTORS.find(a=>a.name===c.pairs[1]);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', a1.cx); line.setAttribute('y1', a1.cy-14);
  line.setAttribute('x2', a2.cx); line.setAttribute('y2', a2.cy-14);
  line.setAttribute('stroke', 'rgba(79,163,255,0.12)');
  line.setAttribute('stroke-width', '1');
  line.setAttribute('stroke-dasharray', '4 6');
  svg.appendChild(line);
});

// ── Animation loop ──
let stepIndex = 0;
let lastStep = Date.now();
const STEP_MS = 5000; // change dialog every 5s

// Walk bob animation
let bobPhase = 0;
let lastFrame = Date.now();

function tick() {
  const now = Date.now();
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;

  // slow walk bob — ~0.8s period
  bobPhase += dt * 1.25; // radians/sec → full cycle = 2π/1.25 ≈ 5s... too slow
  // actually 2π * 1.25 ≈ ~0.8s period feels good
  bobPhase += dt * 7.5; // ~0.8s period

  // bob characters
  ACTORS.forEach(a => {
    const el = document.getElementById('cs_'+a.name);
    if(el) el.style.transform = `translateY(${Math.sin(bobPhase + ACTORS.indexOf(a)*0.9)*1.2|0}px)`;
  });

  // slow LED blink — every ~1.2s
  const ledOn = Math.floor(now / 1200) % 2 === 0;
  ['led1','led2','led3','led4'].forEach((id,i) => {
    const el = document.getElementById(id);
    if(el) el.style.background = (ledOn ^ (i%2===0)) ? '#00ff44' : '#004400';
  });

  // robot eyes slow pulse
  const eyeAlpha = 0.7 + Math.sin(now/2000)*0.25;
  ['reye1','reye2'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.opacity = eyeAlpha;
  });

  // robot chest bars slow animation
  const rbar = document.getElementById('rbar');
  const rbar2 = document.getElementById('rbar2');
  if(rbar)  rbar.style.height  = (4+Math.sin(now/2500)*3).toFixed(1)+'px';
  if(rbar2) rbar2.style.height = (3+Math.sin(now/2000+1)*2.5).toFixed(1)+'px';

  // printer LED pulse
  const prnLed = document.getElementById('prnLed');
  if(prnLed) prnLed.style.background = Math.floor(now/1500)%2===0 ? '#00ff44' : '#004400';

  // slow screen line width changes (every ~2s)
  const screenStep = Math.floor(now / 2000);
  document.querySelectorAll('.sl').forEach((el, i) => {
    const seed = screenStep * 3 + i * 7;
    el.style.width = (4 + (seed % 12)) + 'px';
  });

  // dialog rotation every 5s
  if(now - lastStep >= STEP_MS) {
    lastStep = now;
    stepIndex++;
    ACTORS.forEach(a => {
      if(a.convo < 0) return;
      const convo = CONVOS[a.convo];
      const idx = stepIndex % convo.exchanges.length;
      const [speaker, text] = convo.exchanges[idx];
      const btEl = document.getElementById('bt_'+a.name);
      if(btEl) {
        // highlight the speaking bot, dim the listening one
        const bbEl = document.getElementById('bb_'+a.name);
        if(speaker === a.name) {
          if(bbEl) bbEl.style.borderColor = `${a.color}66`;
          btEl.textContent = text;
        } else {
          if(bbEl) bbEl.style.borderColor = 'rgba(79,163,255,0.14)';
          // show previous line for the other side
          const prevIdx = (stepIndex - 1 + convo.exchanges.length) % convo.exchanges.length;
          const prev = convo.exchanges[prevIdx];
          if(prev[0] === a.name) btEl.textContent = prev[1];
        }
      }
    });
  }

  requestAnimationFrame(tick);
}

// fix: reset bobPhase only used for sin, don't double-add
bobPhase = 0;
lastFrame = Date.now();
requestAnimationFrame(function loop(now) {
  const dt = (now - lastFrame) / 1000;
  lastFrame = now;
  bobPhase += dt * 7.85; // 2π/0.8s ≈ 7.85 rad/s

  ACTORS.forEach((a,i) => {
    const el = document.getElementById('cs_'+a.name);
    if(el) el.style.transform = `translateY(${(Math.sin(bobPhase+i*0.9)*1.5).toFixed(2)}px)`;
  });

  const ms = Date.now();
  ['led1','led2','led3','led4'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(el) el.style.background=(Math.floor(ms/1200+i)%2===0)?'#00ff44':'#004400';
  });
  const eyeA=(0.7+Math.sin(ms/2000)*0.25).toFixed(2);
  ['reye1','reye2'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.opacity=eyeA;});
  const rb=document.getElementById('rbar');const rb2=document.getElementById('rbar2');
  if(rb)rb.style.height=(4+Math.sin(ms/2500)*3).toFixed(1)+'px';
  if(rb2)rb2.style.height=(3+Math.sin(ms/2000+1)*2.5).toFixed(1)+'px';
  const pl=document.getElementById('prnLed');
  if(pl)pl.style.background=Math.floor(ms/1500)%2===0?'#00ff44':'#004400';
  const ss=Math.floor(ms/2000);
  document.querySelectorAll('.sl').forEach((el,i)=>{el.style.width=(4+((ss*3+i*7)%12))+'px';});
  if(ms-lastStep>=STEP_MS){
    lastStep=ms; stepIndex++;
    ACTORS.forEach(a=>{
      if(a.convo<0)return;
      const cv=CONVOS[a.convo];
      const idx=stepIndex%cv.exchanges.length;
      const [sp,tx]=cv.exchanges[idx];
      const btEl=document.getElementById('bt_'+a.name);
      const bbEl=document.getElementById('bb_'+a.name);
      if(btEl){
        if(sp===a.name){
          btEl.textContent=tx;
          if(bbEl)bbEl.style.borderColor=a.color+'55';
        } else {
          const pi=(stepIndex-1+cv.exchanges.length)%cv.exchanges.length;
          const pv=cv.exchanges[pi];
          if(pv[0]===a.name)btEl.textContent=pv[1];
          if(bbEl)bbEl.style.borderColor='rgba(79,163,255,0.14)';
        }
      }
    });
  }
  requestAnimationFrame(loop);
});
</script>
